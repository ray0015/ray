<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЯAY · Terminal Forge</title>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        body {
            font-family: 'IBM Plex Mono', 'Share Tech Mono', monospace;
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, 
                    rgba(0, 255, 200, 0.012) 0px, 
                    rgba(0, 255, 200, 0.012) 2px,
                    transparent 2px,
                    transparent 6px
                ),
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 200, 0.015) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 255, 200, 0.015) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "ЯAY";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-size: 16vw;
            font-weight: 700;
            color: rgba(0, 255, 200, 0.025);
            letter-spacing: 0.15em;
            font-family: 'Share Tech Mono', monospace;
            pointer-events: none;
            z-index: 0;
            user-select: none;
            white-space: nowrap;
            animation: pulseWatermark 10s ease-in-out infinite;
        }

        @keyframes pulseWatermark {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) rotate(-10deg) scale(1.03); }
        }

        /* ----- CARD PRINCIPAL ----- */
        .card {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 14, 20, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 1.8rem 2.2rem 2rem;
            border: 1px solid rgba(0, 255, 200, 0.08);
            box-shadow: 
                0 25px 70px -12px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(0, 255, 200, 0.02),
                inset 0 1px 0 rgba(0, 255, 200, 0.04);
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 
                0 30px 80px -12px rgba(0, 0, 0, 0.95),
                0 0 60px rgba(0, 255, 200, 0.03),
                inset 0 1px 0 rgba(0, 255, 200, 0.06);
        }

        /* ----- HEADER TERMINAL ----- */
        .terminal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0, 255, 200, 0.06);
        }

        .terminal-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .terminal-dot.red { background: #ff4757; box-shadow: 0 0 8px rgba(255, 71, 87, 0.3); }
        .terminal-dot.yellow { background: #ffa502; box-shadow: 0 0 8px rgba(255, 165, 2, 0.3); }
        .terminal-dot.green { background: #00ffc8; box-shadow: 0 0 8px rgba(0, 255, 200, 0.3); }

        .terminal-title-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3rem;
            font-weight: 400;
            color: #7ab8a8;
            letter-spacing: 0.5px;
        }

        .terminal-title-text strong {
            color: #00ffc8;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .terminal-title-text .version {
            color: #3d6a5e;
            font-size: 0.8rem;
            font-weight: 400;
        }

        .terminal-status {
            font-size: 0.65rem;
            color: #3d6a5e;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .terminal-status .online {
            color: #00ffc8;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ----- PROMPT LINE ----- */
        .prompt-line {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #5a9a8a;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .prompt-line .user {
            color: #00ffc8;
            font-weight: 600;
        }

        .prompt-line .path {
            color: #4d7a6e;
        }

        .prompt-line .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #00ffc8;
            animation: blinkCursor 1s step-end infinite;
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ----- LAYOUT PRINCIPAL (2 columnas) ----- */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 820px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ----- OPERADOR SELECTOR ----- */
        .operator-section {
            margin-bottom: 1.2rem;
        }

        .operator-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #3d6a5e;
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .operator-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .operator-btn {
            background: rgba(0, 255, 200, 0.02);
            border: 1px solid rgba(0, 255, 200, 0.06);
            padding: 0.35rem 1.2rem;
            border-radius: 4px;
            font-weight: 400;
            font-size: 0.75rem;
            color: #5a9a8a;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex: 0 1 auto;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .operator-btn:hover {
            background: rgba(0, 255, 200, 0.06);
            border-color: rgba(0, 255, 200, 0.12);
            color: #b0e0d0;
        }

        .operator-btn.active {
            background: rgba(0, 255, 200, 0.08);
            border-color: #00ffc8;
            color: #00ffc8;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.02);
        }

        .operator-btn .op-count {
            font-size: 0.55rem;
            background: rgba(0, 255, 200, 0.04);
            padding: 0.02rem 0.5rem;
            border-radius: 2px;
            color: #4d7a6e;
        }

        .operator-btn.active .op-count {
            background: rgba(0, 255, 200, 0.08);
            color: #00ffc8;
        }

        /* ----- CONTROLES DE CANTIDAD ----- */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1.2rem;
            margin-bottom: 1.2rem;
            background: rgba(0, 255, 200, 0.02);
            padding: 0.4rem 1.2rem;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 200, 0.04);
        }

        .controls-row label {
            font-size: 0.6rem;
            color: #4d7a6e;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Share Tech Mono', monospace;
        }

        .controls-row input[type="number"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 200, 0.08);
            border-radius: 4px;
            padding: 0.2rem 0.6rem;
            width: 70px;
            color: #00ffc8;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }

        .controls-row input[type="number"]:focus {
            border-color: #00ffc8;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.03);
        }

        .controls-row .stats {
            color: #4d7a6e;
            font-size: 0.7rem;
            margin-left: auto;
            font-family: 'Share Tech Mono', monospace;
        }

        .controls-row .stats strong {
            color: #00ffc8;
            font-weight: 600;
        }

        /* ----- LISTA DE NÚMEROS (generados) ----- */
        .numbers-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 200, 0.04);
            margin-bottom: 1.2rem;
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 200, 0.06) transparent;
        }

        .numbers-container::-webkit-scrollbar {
            width: 4px;
        }
        .numbers-container::-webkit-scrollbar-track { background: transparent; }
        .numbers-container::-webkit-scrollbar-thumb { background: rgba(0, 255, 200, 0.08); border-radius: 4px; }

        .number-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.2rem;
            border-bottom: 1px solid rgba(0, 255, 200, 0.02);
            transition: background 0.12s ease;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
        }

        .number-item:hover {
            background: rgba(0, 255, 200, 0.015);
        }
        .number-item:last-child { border-bottom: none; }

        .number-item .num {
            font-family: 'Share Tech Mono', monospace;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: #b0e0d0;
        }

        .number-item .meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .number-item .tag {
            font-size: 0.5rem;
            font-weight: 400;
            padding: 0.1rem 0.6rem;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Share Tech Mono', monospace;
            border: 1px solid transparent;
        }

        .tag-verizon { background: rgba(0, 100, 255, 0.1); color: #5b9aff; border-color: rgba(0, 100, 255, 0.06); }
        .tag-tmobile { background: rgba(255, 0, 80, 0.08); color: #ff6b8a; border-color: rgba(255, 0, 80, 0.05); }
        .tag-att { background: rgba(0, 180, 255, 0.08); color: #4dc9ff; border-color: rgba(0, 180, 255, 0.05); }
        .tag-sprint { background: rgba(255, 200, 0, 0.06); color: #ffd84d; border-color: rgba(255, 200, 0, 0.04); }
        .tag-other { background: rgba(255, 255, 255, 0.03); color: #6a8a80; border-color: rgba(255, 255, 255, 0.02); }

        .btn-action {
            background: rgba(0, 255, 200, 0.02);
            border: 1px solid rgba(0, 255, 200, 0.04);
            padding: 0.15rem 0.7rem;
            border-radius: 2px;
            font-size: 0.5rem;
            font-weight: 400;
            color: #4d7a6e;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-action:hover {
            background: rgba(0, 255, 200, 0.04);
            border-color: rgba(0, 255, 200, 0.08);
            color: #b0e0d0;
        }
        .btn-action:active { transform: scale(0.94); }

        .btn-save-good {
            border-color: rgba(0, 255, 200, 0.06);
            color: #4d7a6e;
        }
        .btn-save-good:hover {
            border-color: rgba(0, 255, 200, 0.15);
            color: #00ffc8;
        }
        .btn-save-good.saved {
            background: rgba(0, 255, 200, 0.06);
            border-color: #00ffc8;
            color: #00ffc8;
        }

        /* ----- LISTA DE GUARDADOS (buenos) ----- */
        .saved-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 200, 0.04);
            margin-bottom: 1.2rem;
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 200, 0.06) transparent;
        }

        .saved-container::-webkit-scrollbar {
            width: 4px;
        }
        .saved-container::-webkit-scrollbar-track { background: transparent; }
        .saved-container::-webkit-scrollbar-thumb { background: rgba(0, 255, 200, 0.08); border-radius: 4px; }

        .saved-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.2rem;
            border-bottom: 1px solid rgba(0, 255, 200, 0.02);
            transition: background 0.12s ease;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
        }

        .saved-item:hover {
            background: rgba(0, 255, 200, 0.015);
        }
        .saved-item:last-child { border-bottom: none; }

        .saved-item .num {
            font-family: 'Share Tech Mono', monospace;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: #00ffc8;
        }

        .saved-item .meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .saved-item .badge-good {
            font-size: 0.5rem;
            font-weight: 400;
            padding: 0.1rem 0.6rem;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Share Tech Mono', monospace;
            background: rgba(0, 255, 200, 0.06);
            color: #00ffc8;
            border: 1px solid rgba(0, 255, 200, 0.06);
        }

        .btn-remove-saved {
            background: rgba(255, 0, 80, 0.02);
            border: 1px solid rgba(255, 0, 80, 0.04);
            padding: 0.15rem 0.7rem;
            border-radius: 2px;
            font-size: 0.5rem;
            font-weight: 400;
            color: #5a3a42;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-remove-saved:hover {
            background: rgba(255, 0, 80, 0.04);
            border-color: rgba(255, 0, 80, 0.06);
            color: #ff6b8a;
        }
        .btn-remove-saved:active { transform: scale(0.94); }

        .empty-state {
            padding: 1.5rem 1.5rem;
            text-align: center;
            color: #3d6a5e;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
        }

        .empty-state span {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 0.2rem;
            opacity: 0.3;
        }

        .empty-state .blink {
            animation: blink 1.5s infinite;
        }

        /* ----- SECCIÓN DE GUARDADOS (header) ----- */
        .saved-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }

        .saved-header .title {
            font-size: 0.7rem;
            color: #00ffc8;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .saved-header .count {
            font-size: 0.6rem;
            color: #4d7a6e;
            font-family: 'Share Tech Mono', monospace;
        }

        .saved-header .count strong {
            color: #00ffc8;
        }

        /* ----- BOTONES DE ACCIÓN ----- */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        .btn {
            border: 1px solid rgba(0, 255, 200, 0.06);
            padding: 0.5rem 1.8rem;
            border-radius: 4px;
            font-weight: 400;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.18s ease;
            flex: 1 1 auto;
            min-width: 100px;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: rgba(0, 255, 200, 0.02);
            color: #5a9a8a;
        }

        .btn-primary {
            background: rgba(0, 255, 200, 0.04);
            border-color: rgba(0, 255, 200, 0.08);
            color: #b0e0d0;
        }
        .btn-primary:hover {
            background: rgba(0, 255, 200, 0.06);
            border-color: rgba(0, 255, 200, 0.12);
            color: #00ffc8;
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.02);
        }
        .btn-primary:active { transform: scale(0.96); }

        .btn-secondary {
            background: rgba(0, 255, 200, 0.01);
            border-color: rgba(0, 255, 200, 0.03);
            color: #4d7a6e;
        }
        .btn-secondary:hover {
            background: rgba(0, 255, 200, 0.03);
            border-color: rgba(0, 255, 200, 0.06);
            color: #8ab8a8;
            transform: translateY(-1px);
        }
        .btn-secondary:active { transform: scale(0.96); }

        .btn-danger {
            background: rgba(255, 0, 80, 0.02);
            border-color: rgba(255, 0, 80, 0.04);
            color: #5a3a42;
        }
        .btn-danger:hover {
            background: rgba(255, 0, 80, 0.04);
            border-color: rgba(255, 0, 80, 0.06);
            color: #ff6b8a;
            transform: translateY(-1px);
        }
        .btn-danger:active { transform: scale(0.96); }

        .btn-success {
            background: rgba(0, 255, 200, 0.03);
            border-color: rgba(0, 255, 200, 0.06);
            color: #4d7a6e;
        }
        .btn-success:hover {
            background: rgba(0, 255, 200, 0.05);
            border-color: rgba(0, 255, 200, 0.10);
            color: #00ffc8;
            transform: translateY(-1px);
        }

        .btn-icon {
            font-size: 0.9rem;
            line-height: 1;
        }

        /* ----- FOOTER ----- */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(0, 255, 200, 0.04);
        }

        .footer-info {
            font-size: 0.55rem;
            color: #3d6a5e;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-info .dot {
            width: 2px;
            height: 2px;
            background: #2d5a4e;
            border-radius: 50%;
            display: inline-block;
        }

        .footer-info strong {
            color: #5a9a8a;
            font-weight: 400;
        }

        .footer-badge {
            background: rgba(0, 255, 200, 0.02);
            padding: 0.1rem 0.8rem;
            border-radius: 2px;
            font-size: 0.55rem;
            color: #3d6a5e;
            font-family: 'Share Tech Mono', monospace;
            border: 1px solid rgba(0, 255, 200, 0.02);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-badge span {
            color: #00ffc8;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 820px) {
            .card { padding: 1.2rem 1.2rem 1.5rem; border-radius: 12px; }
            .terminal-title-text { font-size: 1.1rem; }
            .terminal-title-text strong { font-size: 1.2rem; }
            .prompt-line { font-size: 0.7rem; }
            .number-item .num, .saved-item .num { font-size: 0.85rem; }
            .operator-btn { padding: 0.25rem 0.8rem; font-size: 0.65rem; }
            .btn { padding: 0.4rem 1rem; font-size: 0.65rem; min-width: 80px; }
            .controls-row { padding: 0.3rem 0.8rem; }
            .controls-row input[type="number"] { width: 60px; font-size: 0.75rem; }
            body::after { font-size: 28vw; }
        }

        @media (max-width: 480px) {
            .card { padding: 0.8rem 0.8rem 1.2rem; border-radius: 8px; }
            .number-item { padding: 0.4rem 0.8rem; }
            .saved-item { padding: 0.4rem 0.8rem; }
            .number-item .meta, .saved-item .meta { width: 100%; justify-content: flex-start; }
            .controls-row { flex-direction: column; align-items: stretch; gap: 0.3rem; border-radius: 4px; }
            .controls-row .stats { margin-left: 0; text-align: right; }
            .action-row .btn { min-width: 100%; }
            .terminal-title-text { font-size: 0.9rem; }
            .terminal-title-text strong { font-size: 1rem; }
            .prompt-line { font-size: 0.6rem; flex-wrap: wrap; }
            body::after { font-size: 35vw; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- HEADER TERMINAL -->
    <div class="terminal-header">
        <div class="terminal-title">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            <span class="terminal-title-text"><strong>ЯAY</strong> <span class="version">v2.2</span></span>
        </div>
        <div class="terminal-status">
            <span class="online">● ONLINE</span>
            <span style="color:#3d6a5e;">|</span>
            <span id="totalDisplay">0</span> nums
        </div>
    </div>

    <!-- PROMPT -->
    <div class="prompt-line">
        <span class="user">bot@shadow</span>
        <span class="path">~/generator</span>
        <span style="color:#3d6a5e;">$</span>
        <span style="color:#4d7a6e;">./forge --save-good</span>
        <span class="cursor"></span>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">

        <!-- COLUMNA IZQUIERDA: GENERADOR -->
        <div>

            <!-- OPERADORES -->
            <div class="operator-section">
                <div class="operator-label">◆ FILTER</div>
                <div class="operator-grid" id="operatorSelector">
                    <button class="operator-btn active" data-operator="all">
                        <span>⊞</span> all <span class="op-count">∞</span>
                    </button>
                    <button class="operator-btn" data-operator="verizon">

        function getPrefixesForOperator(op) {
            if (op === 'all') {
                let all = [];
                for (let key in OPERATOR_PREFIXES) {
                    all = all.concat(OPERATOR_PREFIXES[key]);
                }
                return all;
            }
            return OPERATOR_PREFIXES[op] || [];
        }

        function generateSingleNumber(operator) {
            const prefixList = getPrefixesForOperator(operator);
            if (!prefixList.length) return "(201) 555-1234";

            const idx = Math.floor(Math.random() * prefixList.length);
            const entry = prefixList[idx];
            const area = entry.area;
            const prefixes = entry.prefix;
            const pIdx = Math.floor(Math.random() * prefixes.length);
            const prefix3 = prefixes[pIdx];
            const last4 = Math.floor(Math.random() * 10000).toString().padStart(4, '0');

            return `(${area}) ${prefix3}-${last4}`;
        }

        function generateNumbers(count = 10, operator = currentOperator) {
            const nums = [];
            for (let i = 0; i < count; i++) {
                nums.push(generateSingleNumber(operator));
            }
            return nums;
        }

        function detectOperator(num) {
            const areaMatch = num.match(/\((\d{3})\)/);
            const area = areaMatch ? areaMatch[1] : '';
            const prefixMatch = num.match(/\)\s(\d{3})-/);
            const prefix = prefixMatch ? prefixMatch[1] : '';

            for (let key in OPERATOR_PREFIXES) {
                const list = OPERATOR_PREFIXES[key];
                for (let entry of list) {
                    if (entry.area === area && entry.prefix.includes(prefix)) {
                        return key;
                    }
                }
            }
            return 'other';
        }

        function toggleSaved(number, btnElement) {
            const index = savedNumbers.indexOf(number);
            if (index > -1) {
                savedNumbers.splice(index, 1);
                if (btnElement) {
                    btnElement.textContent = '☆ good';
                    btnElement.classList.remove('saved');

            } else {
                savedNumbers.push(number);
                if (btnElement) {
                    btnElement.textContent = '★ saved';
                    btnElement.classList.add('saved');
                }
            }
            saveToLocalStorage();
            renderSaved();
        }

        function copyToClipboard(text, element) {
            if (!text) return;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        if (element) {
                            const original = element.innerHTML;
                            element.innerHTML = '✓ done';
                            setTimeout(() => { element.innerHTML = original; }, 1200);
                        }
                    })
                    .catch(() => { fallbackCopy(text, element); });
            } else {
                fallbackCopy(text, element);
            }
        }

        function fallbackCopy(text, element) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                if (element) {
                    const original = element.innerHTML;
                    element.innerHTML = '✓ done';
                    setTimeout(() => { element.innerHTML = original; }, 1200);
                }
            } catch (err) {
                alert('copy failed');
            }
            document.body.removeChild(textarea);
        }

                return;
            }
            const text = currentNumbers.join('\n');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        const original = copyAllBtn.innerHTML;
                        copyAllBtn.innerHTML = '✓ all copied';
                        setTimeout(() => { copyAllBtn.innerHTML = original; }, 1800);
                    })
                    .catch(() => { fallbackCopy(text, copyAllBtn); });
            } else {
                fallbackCopy(text, copyAllBtn);
            }
        }

        function exportSaved() {
            if (!savedNumbers.length) {
                alert('no saved numbers to export');
                return;
            }
            const text = savedNumbers.join('\n');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        const original = exportSavedBtn.innerHTML;
                        exportSavedBtn.innerHTML = '✓ exported';
                        setTimeout(() => { exportSavedBtn.innerHTML = original; }, 1800);
                    })
                    .catch(() => { fallbackCopy(text, exportSavedBtn); });
            } else {
                fallbackCopy(text, exportSavedBtn);
            }
        }

        function clearSaved() {
            if (!savedNumbers.length) return;
            if (confirm('clear all saved numbers?')) {
                savedNumbers = [];
                saveToLocalStorage();
                renderSaved();
                // Actualizar botones en la lista generada
                document.querySelectorAll('.btn-save-good').forEach(b => {
                    b.textContent = '☆ good';
                    b.classList.remove('saved');
                });
            }
        }

        function refreshNumbers() {
            const count = parseInt(quantityInput.value) || 10;
            const clamped = Math.min(Math.max(count, 1), 999);
            quantityInput.value = clamped;
            currentNumbers = generateNumbers(clamped, currentOperator);
            renderNumbers(currentNumbers);
        }

        function clearNumbers() {
            currentNumbers = [];
            renderNumbers(currentNumbers);
        }

        function setActiveOperator(op) {
            currentOperator = op;
            operatorBtns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-operator') === op) {
                    btn.classList.add('active');
                }
            });
            refreshNumbers();
        }

        // Eventos
        generateBtn.addEventListener('click', refreshNumbers);
        copyAllBtn.addEventListener('click', copyAllNumbers);
        clearBtn.addEventListener('click', clearNumbers);
        clearSavedBtn.addEventListener('click', clearSaved);
        exportSavedBtn.addEventListener('click', exportSaved);

        operatorBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const op = this.getAttribute('data-operator');
                setActiveOperator(op);
            });
        });

        quantityInput.addEventListener('change', function() {
            let val = parseInt(this.value) || 10;
            val = Math.min(Math.max(val, 1), 999);
            this.value = val;
            if (currentNumbers.length) {
                generatedCount.textContent = currentNumbers.length;
            }
        });

        // Inicializar
        setActiveOperator('all');
        renderSaved();
    })();
</script>

</body>
</html>
